name: Validate Mods

on:
  push:
    paths:
      - 'mods/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate mods folder
        run: |
          if ls mods/*.jar >/dev/null 2>&1; then
            echo "Mods found:" 
            ls mods/*.jar
          else
            echo "No Fabric mod jars found in mods/."
          fi
