name: Build Server Package

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare package
        run: |
          zip -r server-package.zip . -x '*.git*' 'world/*' 'world_backups/*' 'logs/*' 'crash-reports/*' 'libraries/*' '*.zip'

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: server-package
          path: server-package.zip
